{% extends "app_base.html" %}
{% block title %}Poster Ready{% endblock %}
{% block content %}
<div class="result-container">
  <h2 class="text-2xl font-bold">Your Poster is Ready</h2>

  <img
    src="{{ generated_image_url }}"
    alt="Generated poster preview"
    class="poster-preview"
  >

  <div class="result-actions">
    <a
      href="{{ url_for('download_generated_poster', filename=generated_key, download_name=download_name) }}"
      class="btn-download"
    >
      Download Poster
    </a>

    <a href="{{ url_for('dashboard') }}" class="btn-generate">
      Generate Another
    </a>
  </div>
</div>

<style>
  .poster-preview {
    width: 300px;
    max-width: 100%;
    border-radius: 10px;
    margin: 20px auto;
    display: block;
  }

  .result-container {
    text-align: center;
    padding: 40px;
    background: white;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
  }

  .result-actions {
    margin-top: 20px;
    display: inline-flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-download {
    background: #22c55e;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
  }

  .btn-generate {
    background: #3b82f6;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
  }
</style>
{% endblock %}
