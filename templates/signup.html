{% extends "base.html" %}
{% block title %}Sign Up | GoldPoster{% endblock %}

{% block content %}
<form method="POST">
  <label class="form-label">Shop Name</label>
  <input type="text" name="shop_name" class="form-control mb-3" required>

  <label class="form-label">Email</label>
  <input type="email" name="email" class="form-control mb-3" required>

  <label class="form-label">Password</label>
  <input type="password" name="password" class="form-control mb-3" required>

  <button type="submit" class="btn btn-dark w-100 btn-auth">Create Account</button>

  <div class="text-center mt-3">
    <a href="{{ url_for('login') }}" class="text-decoration-none">Already have an account?</a>
  </div>
</form>
{% endblock %}
